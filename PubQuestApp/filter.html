<html>

    <head>
        <title>Pub Quest</title>
        <link rel="icon" type="image/png" href="images/pubQuestLogoBlack.png">

        <link rel="stylesheet" href="style.css">

        <script src="filter.js"> // calls script early so it loads earlier</script> 
        <script src="common.js"></script>
    </head>
    
    <body>
        <div class="grid-container">
            <header class="gold-gradient">
                <img src="images/pubQuestLogoBlack.png" alt="Pub Quest Logo" class="logo">
                <span class="title">Pub Quest</span>
                <form id="search" action="filter.html" class="nav-bar">
                    <input name="searchterm" type="text" placeholder="Search..." class="search-bar">
                    <button type="submit" class="search-button"></button>
                </form>
            </header>
            <nav class="nav-column">
                <button class="nav-button active" onclick="navToggle(this)" style="width: 100%"><span class="label">Filter Local Venues</span></button>
                <button class="nav-button" onclick="getLocation('map.html'); navToggle(this)" style="width: 100%"><span class="label">View Local Venues</span></button>
                <button class="nav-button" onclick="getLocation('plan.html'); navToggle(this)" style="width: 100%"><span class="label">Plan A Crawl</span></button>
            </nav>
            <main>
                <div class="nav-bar">
                    <button class="nav-button" onclick="filterToggle(this, 'Cafe Bar')"><span class="label">Cafe Bars</span></button>
                    <button class="nav-button" onclick="filterToggle(this, 'Nightclub')"><span class="label">Nightclubs</span></button>
                    <button class="nav-button" onclick="filterToggle(this, 'Public House')"><span class="label">Pubs</span></button>
                    <button class="nav-button" onclick="filterToggle(this, 'Wine Bar')"><span class="label">Wine Bars</span></button>
                </div>
                <table>
                    <colgroup>
                        <col>
                        <col>
                        <col>
                        <col>
                    </colgroup>
                    <thead class="gold-gradient"><th>Name</th><th>Type</th><th>Address</th><th>Contact</th></thead>
                    <tbody id="results"></tbody>
                </table>
            </main>
        </div>
        
        <script> // leaving this script in the body to ensure rest of script from the js file has loaded first
            var urlParams = new URLSearchParams(location.search);
            var searchTerm = urlParams.get('searchterm');
            if (searchTerm) search(searchTerm);
            else query()
        </script>
    </body>
 
</html>
