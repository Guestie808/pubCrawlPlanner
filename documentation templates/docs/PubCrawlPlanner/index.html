<html>

    <head>
        <title>Pub Quest - Filter Local Venues</title>

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

        <script src="index.js"> // calls script early so it loads earlier
        </script> 
    </head>
    
    <body>
        <div class="grid-container">
            <header class="gold padded gold-gradient">
                <span class="title">Pub Quest - Filter Local Venues</span>
                <form id="search" action="index.html" class="nav-bar">
                    <input name="searchterm" type="text" placeholder="Search..." class="search-bar">
                    <button type="submit" class="search-button"><i class="material-icons">search</i></button>
                </form>
            </header>
            <nav class="nav-column">
                <button class="gold-gradient nav-button" onclick="getLocation('map.html')" style="width: 100%">View Local Venues</button>
                <button class="gold-gradient nav-button" onclick="location.href='index.html'" style="width: 100%">Filter Local Venues</button>
            </nav>
            <main>
                <div class="nav-bar">
                    <button class = "gold-gradient nav-button" onclick="setActive(this); filter('Cafe Bar')">Cafe Bars</button>
                    <button class="gold-gradient nav-button" onclick="setActive(this); filter('Nightclub')">Nightclubs</button>
                    <button class="gold-gradient nav-button" onclick="setActive(this); filter('Public House')">Pubs</button>
                    <button class="gold-gradient nav-button" onclick="setActive(this); filter('Wine Bar')">Wine Bars</button>
                </div>
                <table>
                    <thead><th>Name</th><th>Type</th><th>Address</th><th>Contact</th></thead>
                    <tbody id="results"></tbody>
                </table>
            </main>
        </div>
        
        <script> // leaving this script in the body to ensure rest of script from the js file has loaded first
            var urlParams = new URLSearchParams(location.search);
            var searchTerm = urlParams.get('searchterm');
            if (searchTerm) search(searchTerm);
            else query()
        </script>
    </body>
 
</html>
