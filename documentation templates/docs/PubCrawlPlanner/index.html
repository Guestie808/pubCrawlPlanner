<html>

    <head>
        <title>Pub Quest</title>

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">

        <script src="index.js"> // calls script early so it loads earlier</script> 
        <script src="common.js"></script>
    </head>
    
    <body>
        <div class="grid-container">
            <header class="gold-gradient">
                <span class="title">Pub Quest</span>
                <form id="search" action="index.html" class="nav-bar">
                    <input name="searchterm" type="text" placeholder="Search..." class="search-bar">
                    <button type="submit" class="search-button"></button>
                </form>
            </header>
            <nav class="nav-column">
                <button class="nav-button active" style="width: 100%"><span class="label">Filter Local Venues</span></button>
                <button class="nav-button" onclick="getLocation('map.html'); setColumnActive(this)" style="width: 100%"><span class="label">View Local Venues</span></button>
                <button class="nav-button" onclick="getLocation('plan.html'); setColumnActive(this)" style="width: 100%"><span class="label">Plan A Crawl</span></button>
            </nav>
            <main>
                <div class="nav-bar">
                    <button class="nav-button" onclick="setBarActive(this); filter('Cafe Bar')"><span class="label">Cafe Bars</span></button>
                    <button class="nav-button" onclick="setBarActive(this); filter('Nightclub')"><span class="label">Nightclubs</span></button>
                    <button class="nav-button" onclick="setBarActive(this); filter('Public House')"><span class="label">Pubs</span></button>
                    <button class="nav-button" onclick="setBarActive(this); filter('Wine Bar')"><span class="label">Wine Bars</span></button>
                </div>
                <table>
                    <thead><th>Name</th><th>Type</th><th>Address</th><th>Contact</th></thead>
                    <tbody id="results"></tbody>
                </table>
            </main>
        </div>
        
        <script> // leaving this script in the body to ensure rest of script from the js file has loaded first
            var urlParams = new URLSearchParams(location.search);
            var searchTerm = urlParams.get('searchterm');
            if (searchTerm) search(searchTerm);
            else query()
        </script>
    </body>
 
</html>
