<html>

    <head>
        <title>Pub quest</title>

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
        <script src="common.js"></script>
    
    </head>
 
    <body>
        <div class="grid-container">
            <header class="gold-gradient">
                <span class="title">Pub Quest</span>
                <form id="search" action="index.html" class="nav-bar">
                    <input name="searchterm" type="text" placeholder="Search..." class="search-bar">
                    <button type="submit" class="search-button"></button>
                </form>
            </header>
            <nav class="nav-column">
                <button class="nav-button" onclick="location.href='index.html'; setColumnActive(this)" style="width: 100%;"><span class="label">Filter Local Venues</span></button>
                <button class="nav-button active" style="width: 100%;"><span class="label">View Local Venues</span></button>
                <button class="nav-button" onclick="getLocation('plan.html'); setColumnActive(this)" style="width: 100%"><span class="label">Plan A Crawl</span></button>
            </nav>
            <main>
                <div id="map"><img src = "" alt="Overlay" id="map-overlay"></div>
            </main>
        </div>

        <script src="map.js"></script>

    </body>
    
</html>
