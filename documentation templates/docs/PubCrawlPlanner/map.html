<html>

    <head>
        <title>Pub Quest - View Local Venues</title>

        <link rel="stylesheet" href="style.css">
        <link rel="stylesheet" href="https://www.w3schools.com/w3css/4/w3.css">
        <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin>

        <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin=""></script>
    
    </head>
 
    <body>
        <div class="grid-container">
            <header class="gold padded gold-gradient">
                <span class="title">Pub Quest - View Local Venues</span>
                <form id="search" action="index.html" class="nav-bar">
                    <input name="searchterm" type="text" placeholder="Search..." class="search-bar">
                    <button type="submit" class="search-button"><i class="material-icons">search</i></button>
                </form>
            </header>
            <nav class="nav-bar">
                <button class="gold-gradient nav-button" style="width: fit-content;">View Local Venues</button>
                <button onclick="location.href='index.html'" class="gold-gradient nav-button" style="width: fit-content;">Filter Local Venues</button>
            </nav>
            <main>
                <div id="map"><img src = "images/map-border.png" alt="Overlay" id="map-overlay"></div>
            </main>
        </div>

        <script src="map.js"></script>

    </body>
    
</html>
